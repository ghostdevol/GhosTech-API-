name: GhostTech API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '24.x'

    - name: Install dependencies
      run: npm install

    - name: Skip tests for now
      run: echo "Skipping tests — no real tests defined yet"

    - name: Test Alchemy API (optional)
      env:
        ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}
      run: |
        node -e "
        const { Alchemy, Network } = require('@alch/alchemy-sdk');
        const settings = { apiKey: process.env.ALCHEMY_API_KEY, network: Network.ETH_MAINNET };
        const alchemy = new Alchemy(settings);
        alchemy.core.getBlockNumber().then(n => console.log('Latest block:', n)).catch(console.error);
        "

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '**'       # all other branches
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-22.04   # Skips Ubuntu 24 as requested

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      # 3️⃣ Install npm dependencies
      - name: Install npm packages
        run: npm install

      # 4️⃣ Optional tests (won’t fail workflow)
      - name: Run tests (optional)
        run: |
          if [ -f package.json ]; then
            npm test || echo "Skipping tests — none defined"
          fi

      # 5️⃣ API push (runs for all pushes & PRs)
      - name: Push to API
        run: |
          echo "Running API push..."
          node scripts/apiPush.js   # Replace with your actual API push command

      # 6️⃣ Additional Node tasks
      - name: Run Node scripts
        run: |
          echo "Running other Node tasks..."
          node scripts/anotherTask.js   # Replace as needed

      # 7️⃣ Docker steps (only on main branch)
      - name: Docker login
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        if: github.ref == 'refs/heads/main'
        run: docker build -t your-image-name:latest .

      - name: Push Docker image
        if: github.ref == 'refs/heads/main'
        run: docker push your-image-name:latest

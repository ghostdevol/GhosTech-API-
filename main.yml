name: Full CI/CD Workflow

on:
  push:
    branches-ignore:
      - '24'       # ⬅ skip branch 24
  pull_request:
    branches-ignore:
      - '24'       # ⬅ skip PRs from branch 24

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 1

      # 2️⃣ Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20.x

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: npm install

      # 4️⃣ Run tests (optional)
      - name: Run tests
        run: npm test
        continue-on-error: true

      # 5️⃣ Run Node scripts & API push
      - name: Run Node scripts & API push
        run: |
          echo "Running Node scripts..."
          node scripts/your-node-script.js
          node scripts/api-push.js 6️⃣ Docker build & push (main branch only)
      - name: Docker Build & Push
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Logging into Docker..."
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          echo "Building Docker image..."
          docker build -t your-docker-username/your-image:latest .
          echo "Pushing Docker image..."
          docker push your-docker-username/your-image:latest
